<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1aad19">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            max-width: 100vw;
            overflow-x: hidden;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        h1 {
            color: #1aad19;
            font-size: 2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .subtitle { color: #666; font-size: 0.95em; margin-top: 6px; }
        .translator-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .mode-badge {
            display: inline-block;
            font-size: 0.75em;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 8px;
        }
        .mode-badge.offline { background: #e6f4ff; color: #1890ff; }
        .mode-badge.online { background: #fff7e6; color: #fa8c16; }
        .lang-selector {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }
        .lang-group { flex: 1; min-width: 0; }
        .lang-group label {
            display: block;
            font-size: 0.8em;
            color: #888;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .lang-group select {
            width: 100%;
            padding: 10px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            -webkit-appearance: none;
        }
        .lang-group select:focus { outline: none; border-color: #1aad19; }
        .swap-btn {
            width: 44px;
            height: 44px;
            border: 2px solid #1aad19;
            background: #e8f5e9;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            color: #1aad19;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .swap-btn:hover { background: #1aad19; color: white; }
        .textarea-group {
            position: relative;
            margin-bottom: 14px;
        }
        .textarea-group textarea {
            width: 100%;
            padding: 14px 90px 14px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            resize: vertical;
            transition: border-color 0.3s;
            line-height: 1.6;
            font-family: inherit;
            min-height: 120px;
        }
        .textarea-group textarea:focus { outline: none; border-color: #1aad19; }
        .textarea-actions {
            position: absolute;
            right: 10px;
            top: 10px;
            display: flex;
            gap: 8px;
        }
        .action-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .action-btn:hover { background: #e0e0e0; }
        .action-btn.speak { background: #e8f5e9; color: #1aad19; }
        .action-btn.speak:hover { background: #c8e6c9; }
        .action-btn.mic { background: #e3f2fd; color: #2196f3; }
        .action-btn.mic:hover { background: #bbdefb; }
        .action-btn.mic.recording { background: #ffcdd2; color: #f44336; animation: pulse 1s infinite; }
        .action-btn.mic.disabled { background: #f5f5f5; color: #ccc; cursor: not-allowed; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .action-btn.clear { background: #fce4ec; color: #e91e63; }
        .action-btn.clear:hover { background: #f8bbd9; }
        .translate-btn {
            width: 100%;
            padding: 15px;
            background: #1aad19;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 15px;
        }
        .translate-btn:hover { background: #148f14; }
        .translate-btn:disabled { background: #ccc; cursor: not-allowed; }
        .result-area {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            min-height: 120px;
            border: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }
        .result-text {
            font-size: 1.1em;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 40px;
        }
        .result-actions { display: flex; gap: 10px; margin-top: 12px; }
        .result-btn {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .result-btn:hover { background: #f5f5f5; }
        .result-btn.copy { color: #1890ff; }
        .result-btn.speak { color: #1aad19; }
        .result-btn.speak.speaking { background: #c8e6c9; color: #148f14; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.95em;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; }
        .dict-info {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: #ad6800;
        }
        .dict-info strong { color: #d48806; }
        .char-count {
            position: absolute;
            bottom: 8px;
            right: 10px;
            font-size: 0.75em;
            color: #999;
        }
        .mode-switcher {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .mode-btn {
            padding: 6px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: #1aad19;
            color: white;
            border-color: #1aad19;
        }
        .mode-btn:hover:not(.active) {
            border-color: #1aad19;
            color: #1aad19;
        }
        .translator-source {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
        }
        .source-btn {
            padding: 4px 12px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.75em;
            transition: all 0.3s;
        }
        .source-btn.active {
            background: #1890ff;
            color: white;
            border-color: #1890ff;
        }
        .source-btn:hover:not(.active) {
            border-color: #1890ff;
            color: #1890ff;
        }
        .speech-warning {
            background: #fff7e6;
            border: 1px solid #ffd591;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 15px;
            font-size: 0.8em;
            color: #d46b08;
            display: none;
        }
        .speech-warning.show { display: block; }
        .speech-warning strong { color: #d48806; }
        .network-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }
        .network-status.online { background: #52c41a; }
        .network-status.offline { background: #ff4d4f; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌏 老挝语↔中文 翻译器</h1>
            <p class="subtitle" id="subtitle">完全离线运行 · 无需网络 · 保护隐私</p>
            <span class="mode-badge offline" id="modeBadge">离线词典模式</span>
            <div class="mode-switcher">
                <button class="mode-btn active" id="offlineModeBtn">📖 离线词典</button>
                <button class="mode-btn" id="onlineModeBtn">🌐 在线翻译</button>
            </div>
            <div class="translator-source" id="translatorSource" style="display:none;">
                <span style="font-size:0.8em; color:#888;">翻译源：</span>
                <button class="source-btn active" id="bingBtn">Bing</button>
                <button class="source-btn" id="googleBtn">Google</button>
                <button class="source-btn" id="autoBtn">自动</button>
            </div>
        </header>
        
        <div class="translator-card">
            <div class="speech-warning" id="speechWarning">
                <strong>⚠️ 语音功能提示：</strong>
                <span id="speechWarningText"></span>
            </div>
            
            <div class="dict-info" id="dictInfo">
                <strong>💡 提示：</strong>本版本使用内置老挝语↔中文词典，支持常用词汇、短语和句型翻译。可直接使用语音输入！
            </div>
            
            <div class="lang-selector">
                <div class="lang-group">
                    <label>源语言</label>
                    <select id="srcLang">
                        <option value="lo">老挝语</option>
                        <option value="zh">中文</option>
                    </select>
                </div>
                <button class="swap-btn" id="swapBtn" title="交换语言">⇄</button>
                <div class="lang-group">
                    <label>目标语言</label>
                    <select id="tgtLang">
                        <option value="zh">中文</option>
                        <option value="lo">老挝语</option>
                    </select>
                </div>
            </div>
            
            <div class="textarea-group">
                <textarea id="inputText" placeholder="输入要翻译的文字..." maxlength="2000"></textarea>
                <div class="textarea-actions">
                    <button class="action-btn mic" id="micBtn" title="语音输入">🎤</button>
                    <button class="action-btn speak" id="speakInputBtn" title="朗读输入">🔊</button>
                    <button class="action-btn clear" id="clearBtn" title="清空">✕</button>
                </div>
                <span class="char-count"><span id="charCount">0</span>/2000</span>
            </div>
            
            <button class="translate-btn" id="translateBtn">翻译</button>
            
            <div class="result-area">
                <div class="result-text" id="resultText">翻译结果将显示在这里</div>
                <div class="result-actions">
                    <button class="result-btn copy" id="copyBtn">📋 复制</button>
                    <button class="result-btn speak" id="readBtn">🔊 朗读</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

            '啤酒': 'lao hao', '老挝': 'meuang lao', '万象': 'vientiane', '琅勃拉邦': 'luang prabang',

    // ============ DOM 元素 ============
    var srcLangEl, tgtLangEl, inputTextEl, resultTextEl, translateBtnEl;
    
    // ============ 工具函数 ============
    function $(id) { return document.getElementById(id); }
    
    function showToast(msg) {
        var t = $('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2500);
    }
    
    function updateCharCount() {
        $('charCount').textContent = $('inputText').value.length;
    }
    
    function getSpeechLang(lang) {
        return lang === 'lo' ? 'lo-LA' : 'zh-CN';
    }
    
    // ============ 浏览器和语音功能检测 ============
    function detectBrowser() {
        var ua = navigator.userAgent || '';
        var browser = 'unknown';
        
        if (ua.indexOf('UCBrowser') > -1 || ua.indexOf('UCWEB') > -1) {
            browser = 'uc';
        } else if (ua.indexOf('MicroMessenger') > -1) {
            browser = 'weixin';
        } else if (ua.indexOf('QQBrowser') > -1) {
            browser = 'qq';
        } else if (ua.indexOf('Firefox') > -1) {
            browser = 'firefox';
        } else if (ua.indexOf('Chrome') > -1) {
            browser = 'chrome';
        } else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) {
            browser = 'safari';
        } else if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) {
            browser = 'ios';
        } else if (ua.indexOf('Android') > -1) {
            browser = 'android';
        }
        
        return browser;
    }
    
    function checkSpeechRecognitionSupport() {
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            return false;
        }
        
        // 尝试实例化检测
        try {
            var testRec = new SpeechRecognition();
            return true;
        } catch(e) {
            return false;
        }
    }
    
    function checkSpeechSynthesisSupport() {
        if (!('speechSynthesis' in window)) {
            return false;
        }
        
        // 尝试获取语音列表
        try {
            // 部分浏览器支持 speechSynthesis 但没有语音
            var voices = speechSynthesis.getVoices();
            return true;
        } catch(e) {
            return false;
        }
    }
    
    function initSpeechSupport() {
        var browser = detectBrowser();
        
        // 检测语音识别
        speechSupport.recognition = checkSpeechRecognitionSupport();
        
        // 检测语音合成
        speechSupport.synthesis = checkSpeechSynthesisSupport();
        
        // 针对UC浏览器特殊处理
        if (browser === 'uc') {
            // UC浏览器通常不支持语音识别
            speechSupport.recognition = false;
            // UC浏览器的语音合成支持有限
            if (speechSupport.synthesis) {
                var voices = speechSynthesis.getVoices();
                if (!voices || voices.length === 0) {
                    speechSupport.synthesis = false;
                }
            }
        }
        
        // 更新UI
        updateSpeechUI();
    }
    
    function updateSpeechUI() {
        var warningEl = $('speechWarning');
        var warningTextEl = $('speechWarningText');
        var micBtn = $('micBtn');
        var speakInputBtn = $('speakInputBtn');
        var readBtn = $('readBtn');
        
        var messages = [];
        var browser = detectBrowser();
        var isOffline = !navigator.onLine;
        
        // 网络状态提示
        if (isOffline) {
            messages.push('<span class="network-status offline"></span>当前离线');
        } else {
            messages.push('<span class="network-status online"></span>网络正常');
        }
        
        // 语音识别提示
        if (!speechSupport.recognition) {
            micBtn.classList.add('disabled');
            micBtn.title = '当前浏览器不支持语音输入，请使用系统键盘的语音输入功能';
            
            if (browser === 'uc') {
                messages.push('UC浏览器不支持语音识别，请使用手机系统键盘的🎤按钮进行语音输入');
            } else if (browser === 'weixin') {
                messages.push('微信内置浏览器可能不支持语音识别，请使用系统键盘');
            } else {
                messages.push('当前浏览器不支持语音识别，请使用手机键盘的🎤按钮');
            }
        }
        
        // 语音合成提示
        if (!speechSupport.synthesis) {
            speakInputBtn.classList.add('disabled');
            speakInputBtn.title = '当前浏览器不支持语音朗读';
            readBtn.classList.add('disabled');
            readBtn.title = '当前浏览器不支持语音朗读';
            
            if (browser === 'uc') {
                messages.push('UC浏览器语音合成支持有限，如需朗读请复制文字后使用系统朗读功能');
            } else {
                messages.push('当前浏览器不支持语音朗读功能');
            }
        }
        
        if (messages.length > 0) {
            warningTextEl.innerHTML = messages.join(' · ');
            warningEl.classList.add('show');
        }
    }
    
    // ============ 翻译函数 ============
    function translateWithDict(text, srcLang, tgtLang) {
        var key = text.trim().toLowerCase();
        var direction = srcLang === 'lo' ? 'lo_zh' : 'zh_lo';
        var dict = DICTIONARY[direction];
        
        if (dict[key]) {
            return dict[key];
        }
        
        var words = key.split(/\s+/);
        var results = [];
        var foundCount = 0;
        
        for (var i = 0; i < words.length; i++) {
            if (dict[words[i]]) {
                results.push(dict[words[i]]);
                foundCount++;
            } else {
                results.push(words[i]);
            }
        }
        
        if (foundCount > 0) {
            var result = results.join(' ');
            if (foundCount === words.length) {
                return result;
            }
            return '翻译: ' + result;
        }
        
        return '【未收录】词典中没有这个词\n原文: ' + text;
    }
    
    async function translateOnline(text, fromLang, toLang) {
        // 尝试 MyMemory API
        try {
            var fromCode = fromLang === 'lo' ? 'lo' : 'zh-CN';
            var toCode = fromLang === 'lo' ? 'zh-CN' : 'lo';
            var url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + fromCode + '|' + toCode;
            
            var resp = await fetch(url);
            var data = await resp.json();
            
            if (data.responseStatus === 200 && data.responseData) {
                return data.responseData.translatedText;
            }
        } catch(e) {}
        
        // 尝试 LibreTranslate
        try {
            var resp2 = await fetch('https://libretranslate.com/translate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    q: text,
                    source: fromLang === 'lo' ? 'lo' : 'zh',
                    target: fromLang === 'lo' ? 'zh' : 'lo'
                })
            });
            var data2 = await resp2.json();
            if (data2.translatedText) {
                return data2.translatedText;
            }
        } catch(e) {}
        
        throw new Error('在线翻译失败');
    }
    
    async function doTranslate() {
        var text = $('inputText').value.trim();
        if (!text) {
            showToast('请输入要翻译的文字');
            return;
        }
        
        $('resultText').textContent = '正在翻译...';
        $('translateBtn').disabled = true;
        
        try {
            var result;
            if (translationMode === 'online') {
                try {
                    result = await translateOnline(text, $('srcLang').value, $('tgtLang').value);
                } catch(e) {
                    showToast('在线翻译失败，使用离线词典');
                    result = translateWithDict(text, $('srcLang').value, $('tgtLang').value);
                    result += '\n(离线词典)';
                }
            } else {
                result = translateWithDict(text, $('srcLang').value, $('tgtLang').value);
            }
            $('resultText').textContent = result;
        } catch(e) {
            $('resultText').textContent = '翻译失败，请重试';
            showToast('翻译失败');
        }
        
        $('translateBtn').disabled = false;
    }
    
    // ============ 模式切换 ============
    function setTranslationMode(mode) {
        translationMode = mode;
        
        $('offlineModeBtn').classList.toggle('active', mode === 'offline');
        $('onlineModeBtn').classList.toggle('active', mode === 'online');
        
        var badge = $('modeBadge');
        if (mode === 'offline') {
            badge.textContent = '离线词典模式';
            badge.className = 'mode-badge offline';
            $('subtitle').textContent = '完全离线运行 · 无需网络 · 保护隐私';
            $('dictInfo').innerHTML = '<strong>💡 提示：</strong>本版本使用内置老挝语↔中文词典，支持常用词汇、短语和句型翻译。可直接使用语音输入！';
            $('translatorSource').style.display = 'none';
        } else {
            badge.textContent = '在线翻译模式';
            badge.className = 'mode-badge online';
            $('subtitle').textContent = '支持 Bing/Google 翻译 · 需联网';
            $('dictInfo').innerHTML = '<strong>💡 提示：</strong>在线翻译支持整句翻译和更丰富的词汇。可选择翻译源！';
            $('translatorSource').style.display = 'flex';
        }
    }
    
    function setTranslatorSource(source) {
        translatorSource = source;
        $('bingBtn').classList.remove('active');
        $('googleBtn').classList.remove('active');
        $('autoBtn').classList.remove('active');
        $('autoBtn').classList.add('active');
        showToast('翻译源: 自动模式');
    }
    
    // ============ 语音功能 ============
    function initSpeech() {
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            return;
        }
        
        try {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'lo-LA';
            
            recognition.onresult = function(event) {
                var transcript = event.results[0][0].transcript;
                $('inputText').value = transcript;
                updateCharCount();
                doTranslate();
                stopRecording();
            };
            
            recognition.onerror = function(event) {
                stopRecording();
                switch(event.error) {
                    case 'no-speech':
                        showToast('没有检测到语音，请重试');
                        break;
                    case 'not-allowed':
                        showToast('请允许麦克风权限');
                        break;
                    case 'network':
                        showToast('网络错误，请检查网络连接后重试');
                        break;
                    case 'aborted':
                        // 用户主动停止，不提示
                        break;
                    default:
                        showToast('语音识别出错，请使用键盘输入');
                }
            };
            
            recognition.onend = stopRecording;
            
            speechSupport.recognition = true;
        } catch(e) {
            speechSupport.recognition = false;
        }
    }
    
    function startRecording() {
        // 检查支持状态
        if (!speechSupport.recognition) {
            var browser = detectBrowser();
            if (browser === 'uc') {
                showToast('UC浏览器不支持语音识别，请使用系统键盘🎤');
            } else {
                showToast('当前浏览器不支持语音识别');
            }
            return;
        }
        
        // 检查网络状态
        if (!navigator.onLine) {
            showToast('语音识别需要网络连接，请检查网络');
            return;
        }
        
        if (!recognition) {
            initSpeech();
        }
        
        if (recognition) {
            try {
                recognition.lang = getSpeechLang($('srcLang').value);
                recognition.start();
                isRecording = true;
                $('micBtn').classList.add('recording');
                showToast('正在聆听... 点击麦克风可停止');
            } catch(e) {
                showToast('启动语音识别失败');
                isRecording = false;
            }
        }
    }
    
    function stopRecording() {
        if (recognition && isRecording) {
            try {
                recognition.stop();
            } catch(e) {
                // 忽略停止错误
            }
        }
        isRecording = false;
        $('micBtn').classList.remove('recording');
    }
    
    // 语音合成 Polyfill 和改进
    function speakText(text, lang) {
        // 检查支持状态
        if (!speechSupport.synthesis) {
            showToast('当前浏览器不支持语音朗读功能');
            return;
        }
        
        // 停止之前的朗读
        if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            $('readBtn').classList.remove('speaking');
            return;
        }
        
        try {
            window.speechSynthesis.cancel();
            
            var u = new SpeechSynthesisUtterance(text);
            u.lang = getSpeechLang(lang);
            u.rate = 0.9;
            u.volume = 1;
            
            // 尝试获取可用的语音
            var voices = window.speechSynthesis.getVoices();
            var targetLang = lang === 'lo' ? 'lao' : 'zh';
            
            // 优先选择匹配的语音
            for (var i = 0; i < voices.length; i++) {
                var voice = voices[i];
                if (voice.lang.indexOf(targetLang) !== -1 || 
                    voice.lang.indexOf(lang === 'lo' ? 'LO' : 'ZH') !== -1) {
                    u.voice = voice;
                    break;
                }
            }
            
            u.onstart = function() {
                isSpeaking = true;
                $('readBtn').classList.add('speaking');
                showToast('正在朗读...');
            };
            
            u.onend = function() {
                isSpeaking = false;
                $('readBtn').classList.remove('speaking');
            };
            
            u.onerror = function(event) {
                isSpeaking = false;
                $('readBtn').classList.remove('speaking');
                if (event.error !== 'canceled') {
                    showToast('朗读出错，请重试');
                }
            };
            
            window.speechSynthesis.speak(u);
        } catch(e) {
            showToast('朗读功能出错');
            isSpeaking = false;
            $('readBtn').classList.remove('speaking');
        }
    }
    
    // ============ 初始化 ============
    function init() {
        // DOM 元素
        srcLangEl = $('srcLang');
        tgtLangEl = $('tgtLang');
        inputTextEl = $('inputText');
        resultTextEl = $('resultText');
        translateBtnEl = $('translateBtn');
        
        // 初始化语音支持检测
        initSpeechSupport();
        
        // 初始化语音识别
        initSpeech();
        
        // 语音合成可能需要异步加载 voices
        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = function() {
                speechSupport.synthesis = checkSpeechSynthesisSupport();
                updateSpeechUI();
            };
            
            // 尝试获取语音
            setTimeout(function() {
                speechSupport.synthesis = checkSpeechSynthesisSupport();
                updateSpeechUI();
            }, 1000);
        }
        
        // 模式切换
        $('offlineModeBtn').onclick = function() { setTranslationMode('offline'); };
        $('onlineModeBtn').onclick = function() { setTranslationMode('online'); };
        $('bingBtn').onclick = function() { setTranslatorSource('bing'); };
        $('googleBtn').onclick = function() { setTranslatorSource('google'); };
        $('autoBtn').onclick = function() { setTranslatorSource('auto'); };
        
        // 语言交换
        $('swapBtn').onclick = function() {
            var tmp = srcLangEl.value;
            srcLangEl.value = tgtLangEl.value;
            tgtLangEl.value = tmp;
            showToast('已交换语言');
        };
        
        // 输入事件
        inputTextEl.addEventListener('input', updateCharCount);
        
        // 翻译按钮
        translateBtnEl.onclick = doTranslate;
        
        // 清空按钮
        $('clearBtn').onclick = function() {
            inputTextEl.value = '';
            updateCharCount();
            resultTextEl.textContent = '翻译结果将显示在这里';
        };
        
        // 复制按钮
        $('copyBtn').onclick = function() {
            var text = resultTextEl.textContent;
            if (text && text !== '翻译结果将显示在这里') {
                navigator.clipboard.writeText(text).then(function() {
                    showToast('已复制到剪贴板');
                }).catch(function() {
                    showToast('复制失败');
                });
            }
        };
        
        // 朗读按钮
        $('readBtn').onclick = function() {
            var text = resultTextEl.textContent;
            if (text && text !== '翻译结果将显示在这里') {
                speakText(text, tgtLangEl.value);
            }
        };
        
        // 语音输入按钮
        $('micBtn').onclick = function() {
            if (isRecording) {
                stopRecording();
                showToast('已停止录音');
            } else {
                startRecording();
            }
        };
        
        // 朗读输入
        $('speakInputBtn').onclick = function() {
            if (!speechSupport.synthesis) {
                showToast('当前浏览器不支持语音朗读');
                return;
            }
            var text = inputTextEl.value.trim();
            if (text) {
                speakText(text, srcLangEl.value);
            }
        };
        
        // 语言变化时更新语音识别语言
        srcLangEl.addEventListener('change', function() {
            if (recognition) {
                recognition.lang = getSpeechLang(srcLangEl.value);
            }
        });
        
        // 监听网络状态变化
        window.addEventListener('online', function() {
            updateSpeechUI();
            showToast('网络已连接');
        });
        
        window.addEventListener('offline', function() {
            updateSpeechUI();
            showToast('网络已断开，语音功能不可用');
        });
        
        console.log('老挝语翻译器已初始化');
    }
    
    // DOM 加载完成后初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    </script>
</body>
