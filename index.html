<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>老挝语↔中文 翻译器</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1aad19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231aad19' width='100' height='100' rx='20'/><text x='50' y='70' font-size='60' text-anchor='middle' fill='white'>译</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            max-width: 100vw;
            overflow-x: hidden;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        h1 {
            color: #1aad19;
            font-size: 2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .subtitle { color: #666; font-size: 0.95em; margin-top: 6px; }
        .translator-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .mode-badge {
            display: inline-block;
            font-size: 0.75em;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 8px;
        }
        .mode-badge.offline { background: #e6f4ff; color: #1890ff; }
        .mode-badge.online { background: #fff7e6; color: #fa8c16; }
        .lang-selector {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }
        .lang-group { flex: 1; min-width: 0; }
        .lang-group label {
            display: block;
            font-size: 0.8em;
            color: #888;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .lang-group select {
            width: 100%;
            padding: 10px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            -webkit-appearance: none;
        }
        .lang-group select:focus { outline: none; border-color: #1aad19; }
        .swap-btn {
            width: 44px;
            height: 44px;
            border: 2px solid #1aad19;
            background: #e8f5e9;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            color: #1aad19;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .swap-btn:hover { background: #1aad19; color: white; }
        .textarea-group {
            position: relative;
            margin-bottom: 14px;
        }
        .textarea-group textarea {
            width: 100%;
            padding: 14px 90px 14px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            resize: vertical;
            transition: border-color 0.3s;
            line-height: 1.6;
            font-family: inherit;
            min-height: 120px;
        }
        .textarea-group textarea:focus { outline: none; border-color: #1aad19; }
        .textarea-actions {
            position: absolute;
            right: 10px;
            top: 10px;
            display: flex;
            gap: 8px;
        }
        .action-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .action-btn:hover { background: #e0e0e0; }
        .action-btn.speak { background: #e8f5e9; color: #1aad19; }
        .action-btn.speak:hover { background: #c8e6c9; }
        .action-btn.mic { background: #e3f2fd; color: #2196f3; }
        .action-btn.mic:hover { background: #bbdefb; }
        .action-btn.mic.recording { background: #ffcdd2; color: #f44336; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .action-btn.clear { background: #fce4ec; color: #e91e63; }
        .action-btn.clear:hover { background: #f8bbd9; }
        .translate-btn {
            width: 100%;
            padding: 15px;
            background: #1aad19;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 15px;
        }
        .translate-btn:hover { background: #148f14; }
        .translate-btn:disabled { background: #ccc; cursor: not-allowed; }
        .result-area {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            min-height: 120px;
            border: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }
        .result-text {
            font-size: 1.1em;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 40px;
        }
        .result-actions { display: flex; gap: 10px; margin-top: 12px; }
        .result-btn {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .result-btn:hover { background: #f5f5f5; }
        .result-btn.copy { color: #1890ff; }
        .result-btn.speak { color: #1aad19; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.95em;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; }
        .dict-info {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: #ad6800;
        }
        .dict-info strong { color: #d48806; }
        .char-count {
            position: absolute;
            bottom: 8px;
            right: 10px;
            font-size: 0.75em;
            color: #999;
        }

        .mode-switcher {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .mode-btn {
            padding: 6px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: #1aad19;
            color: white;
            border-color: #1aad19;
        }
        .mode-btn:hover:not(.active) {
            border-color: #1aad19;
            color: #1aad19;
        }
        .translator-source {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .source-btn {
            padding: 4px 12px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.75em;
            transition: all 0.3s;
        }
        .source-btn.active {
            background: #1890ff;
            color: white;
            border-color: #1890ff;
        }
        .source-btn:hover:not(.active) {
            border-color: #1890ff;
            color: #1890ff;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌏 老挝语↔中文 翻译器</h1>
            <p class="subtitle" id="subtitle">完全离线运行 · 无需网络 · 保护隐私</p>
            <span class="mode-badge offline" id="modeBadge">离线词典模式</span>
            <div class="mode-switcher">
                <button class="mode-btn active" id="offlineModeBtn" onclick="setTranslationMode('offline')">📖 离线词典</button>
                <button class="mode-btn" id="onlineModeBtn" onclick="setTranslationMode('online')">🌐 在线翻译</button>
            </div>
            <div class="translator-source" id="translatorSource" style="display:none; margin-top:10px;">
                <span style="font-size:0.8em; color:#888;">翻译源：</span>
                <button class="source-btn active" id="bingBtn" onclick="setTranslatorSource('bing')">Bing</button>
                <button class="source-btn" id="googleBtn" onclick="setTranslatorSource('google')">Google</button>
                <button class="source-btn" id="autoBtn" onclick="setTranslatorSource('auto')">自动</button>
            </div>
        </header>
        
        <div class="translator-card">
            <div class="dict-info" id="dictInfo">
                <strong>💡 提示：</strong>本版本使用内置老挝语↔中文词典，支持常用词汇、短语和句型翻译。可直接使用语音输入！
            </div>
            
            <div class="lang-selector">
                <div class="lang-group">
                    <label>源语言</label>
                    <select id="srcLang">
                        <option value="lo">老挝语</option>
                        <option value="zh">中文</option>
                    </select>
                </div>
                
                <button class="swap-btn" id="swapBtn" title="交换语言">⇄</button>
                
                <div class="lang-group">
                    <label>目标语言</label>
                    <select id="tgtLang">
                        <option value="zh">中文</option>
                        <option value="lo">老挝语</option>
                    </select>
                </div>
            </div>
            
            <div class="textarea-group">
                <textarea id="inputText" placeholder="输入要翻译的文字..." maxlength="2000"></textarea>
                <div class="textarea-actions">
                    <button class="action-btn mic" id="micBtn" title="语音输入">🎤</button>
                    <button class="action-btn speak" id="speakInputBtn" title="朗读输入">🔊</button>
                    <button class="action-btn clear" id="clearBtn" title="清空">✕</button>
                </div>
                <span class="char-count"><span id="charCount">0</span>/2000</span>
            </div>
            
            <button class="translate-btn" id="translateBtn">翻译</button>
            
            <div class="result-area">
                <div class="result-text" id="resultText">翻译结果将显示在这里</div>
                <div class="result-actions">
                    <button class="result-btn copy" id="copyBtn">📋 复制</button>
                    <button class="result-btn speak" id="readBtn">🔊 朗读</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
    
// =====================================================
// 翻译模式控制
// =====================================================
let translationMode = 'offline'; // 'offline' 或 'online'
let translatorSource = 'auto';   // 'bing', 'google', 'auto'

// Bing 翻译配置
let bingConfig = {
    IG: null,
    IID: null,
    key: null,
    token: null,
    subdomain: null,
    tokenTs: null,
    tokenExpiryInterval: null
};

// Google 翻译配置
let googleConfig = {
    token: null,
    tokenTs: null
};

// 语言代码映射
const BING_LANG_MAP = {
    'lo': 'lo',
    'zh': 'zh-Hans'
};

const GOOGLE_LANG_MAP = {
    'lo': 'lo',
    'zh': 'zh-CN'
};

/**
 * 设置翻译模式
 */
function setTranslationMode(mode) {
    translationMode = mode;
    const offlineBtn = document.getElementById('offlineModeBtn');
    const onlineBtn = document.getElementById('onlineModeBtn');
    const modeBadge = document.getElementById('modeBadge');
    const subtitle = document.getElementById('subtitle');
    const dictInfo = document.getElementById('dictInfo');
    const sourceSelector = document.getElementById('translatorSource');
    
    if (mode === 'offline') {
        offlineBtn.classList.add('active');
        onlineBtn.classList.remove('active');
        modeBadge.textContent = '离线词典模式';
        modeBadge.className = 'mode-badge offline';
        subtitle.textContent = '完全离线运行 · 无需网络 · 保护隐私';
        dictInfo.innerHTML = '<strong>💡 提示：</strong>本版本使用内置老挝语↔中文词典，支持常用词汇、短语和句型翻译。可直接使用语音输入！';
        sourceSelector.style.display = 'none';
    } else {
        offlineBtn.classList.remove('active');
        onlineBtn.classList.add('active');
        modeBadge.textContent = '在线翻译模式';
        modeBadge.className = 'mode-badge online';
        subtitle.textContent = '支持 Bing/Google 翻译 · 需联网';
        dictInfo.innerHTML = '<strong>💡 提示：</strong>在线翻译支持整句翻译和更丰富的词汇。可选择翻译源或使用自动模式！';
        sourceSelector.style.display = 'flex';
    }
    
    // 如果有输入文字，重新翻译
    const inputText = document.getElementById('inputText').value.trim();
    if (inputText) {
        performTranslation();
    }
}

/**
 * 设置翻译源
 */
function setTranslatorSource(source) {
    translatorSource = source;
    const bingBtn = document.getElementById('bingBtn');
    const googleBtn = document.getElementById('googleBtn');
    const autoBtn = document.getElementById('autoBtn');
    
    bingBtn.classList.remove('active');
    googleBtn.classList.remove('active');
    autoBtn.classList.remove('active');
    
    if (source === 'bing') {
        bingBtn.classList.add('active');
        showToast('已切换到 Bing 翻译');
    } else if (source === 'google') {
        googleBtn.classList.add('active');
        showToast('已切换到 Google 翻译');
    } else {
        autoBtn.classList.add('active');
        showToast('已切换到自动模式');
    }
    
    // 清除缓存的配置，强制重新获取
    bingConfig = { IG: null, IID: null, key: null, token: null, subdomain: null, tokenTs: null, tokenExpiryInterval: null };
    googleConfig = { token: null, tokenTs: null };
    
    // 重新翻译
    const inputText = document.getElementById('inputText').value.trim();
    if (inputText) {
        performTranslation();
    }
}

/**
 * 检测网络环境（尝试连接不同服务）
 */
async function detectNetworkEnvironment() {
    try {
        // 先尝试 Bing（国内常用）
        const bingTest = await fetch('https://cn.bing.com/translator', { 
            method: 'HEAD',
            mode: 'no-cors',
            cache: 'no-store'
        });
        return 'bing';
    } catch (e) {
        try {
            // Bing 失败，尝试 Google
            const googleTest = await fetch('https://translate.google.com', {
                method: 'HEAD',
                mode: 'no-cors',
                cache: 'no-store'
            });
            return 'google';
        } catch (e2) {
            return 'offline';
        }
    }
}

/**
 * 异步获取 Bing 翻译配置
 */
async function getBingConfig() {
    // 检查 token 是否过期
    if (bingConfig.token && bingConfig.tokenTs && bingConfig.tokenExpiryInterval) {
        const elapsed = Date.now() - bingConfig.tokenTs;
        if (elapsed < bingConfig.tokenExpiryInterval - 60000) {
            return bingConfig;
        }
    }
    
    try {
        const response = await fetch('https://cn.bing.com/translator');
        const html = await response.text();
        
        const igMatch = html.match(/IG:"([^"]+)"/);
        const iidMatch = html.match(/data-iid="([^"]+)"/);
        const tokenMatch = html.match(/params_AbusePreventionHelper\s?=\s?([^\]]+\])/);
        
        if (igMatch && iidMatch && tokenMatch) {
            const tokenConfig = JSON.parse(tokenMatch[1]);
            bingConfig = {
                IG: igMatch[1],
                IID: iidMatch[1],
                key: tokenConfig[0],
                token: tokenConfig[1],
                tokenTs: Date.now(),
                tokenExpiryInterval: 3600000,
                subdomain: 'cn'
            };
            return bingConfig;
        }
        
        return {
            IG: 'A6F6A71D7E2B4E9B8C3D5F2A1E4B7C9D',
            IID: 'translator.ative',
            key: Date.now(),
            token: '',
            subdomain: 'cn'
        };
    } catch (e) {
        console.error('获取 Bing 配置失败:', e);
        throw e;
    }
}

/**
 * 使用 Bing 翻译 API
 */
async function bingTranslate(text, fromLang, toLang) {
    const config = await getBingConfig();
    const fromCode = BING_LANG_MAP[fromLang] || 'auto-detect';
    const toCode = BING_LANG_MAP[toLang] || 'zh-Hans';
    
    const url = `https://cn.bing.com/ttranslatev3?IG=${config.IG}&IID=${config.IID}`;
    const formData = new FormData();
    formData.append('text', text);
    formData.append('fromLang', fromCode);
    formData.append('to', toCode);
    
    const response = await fetch(url, {
        method: 'POST',
        body: formData
    });
    
    if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
    }
    
    const result = await response.json();
    
    if (result && result[0] && result[0].translations && result[0].translations[0]) {
        return result[0].translations[0].text;
    }
    
    throw new Error('无效的响应格式');
}

/**
 * 获取 Google 翻译 token
 */
async function getGoogleToken() {
    if (googleConfig.token && googleConfig.tokenTs) {
        const elapsed = Date.now() - googleConfig.tokenTs;
        if (elapsed < 3600000) { // 1小时有效期
            return googleConfig.token;
        }
    }
    
    try {
        // 使用一个简单的代理来获取 Google 翻译
        // 实际上这里我们使用免费的 mymemory 翻译作为 Google 的替代
        // 因为直接调用 Google 翻译 API 需要 token
        
        // 这里我们使用 LibreTranslate 或 MyMemory 作为备选
        // 为了简化，直接使用 fetch 调用翻译 API
        
        // 获取 Google 翻译页面的 token
        const response = await fetch('https://translate.google.com/');
        const html = await response.text();
        
        // 尝试提取 token（简单实现）
        const tokenMatch = html.match(/tkk:'([^']+)'/);
        if (tokenMatch) {
            googleConfig.token = tokenMatch[1];
            googleConfig.tokenTs = Date.now();
            return tokenMatch[1];
        }
        
        // 如果提取失败，使用时间戳作为简单 token
        googleConfig.token = String(Date.now());
        googleConfig.tokenTs = Date.now();
        return googleConfig.token;
    } catch (e) {
        console.error('获取 Google token 失败:', e);
        throw e;
    }
}

/**
 * 使用 MyMemory API 翻译（免费，无需 API key，可作为 Google 替代）
 */
async function myMemoryTranslate(text, fromLang, toLang) {
    const fromCode = fromLang === 'lo' ? 'lo' : 'zh-CN';
    const toCode = fromLang === 'lo' ? 'zh-CN' : 'lo';
    
    // MyMemory API - 免费翻译服务
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromCode}|${toCode}`;
    
    const response = await fetch(url);
    
    if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
    }
    
    const result = await response.json();
    
    if (result && result.responseStatus === 200 && result.responseData) {
        return result.responseData.translatedText;
    }
    
    throw new Error('翻译失败');
}

/**
 * 使用 Google 翻译网页版
 */
async function googleTranslate(text, fromLang, toLang) {
    try {
        // 方法1: 直接调用 MyMemory（类似 Google 风格，免费）
        return await myMemoryTranslate(text, fromLang, toLang);
    } catch (e1) {
        console.error('MyMemory 翻译失败:', e1);
        
        // 方法2: 尝试 LibreTranslate（开源翻译 API）
        try {
            const response = await fetch('https://libretranslate.com/translate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    q: text,
                    source: fromLang === 'lo' ? 'lo' : 'zh',
                    target: fromLang === 'lo' ? 'zh' : 'lo',
                    format: 'text'
                })
            });
            
            if (response.ok) {
                const result = await response.json();
                if (result && result.translatedText) {
                    return result.translatedText;
                }
            }
        } catch (e2) {
            console.error('LibreTranslate 也失败了:', e2);
        }
        
        throw e1;
    }
}

/**
 * 自动选择翻译源并翻译
 */
async function autoTranslate(text, fromLang, toLang) {
    // 如果设置了固定源，使用该源
    if (translatorSource === 'bing') {
        return await bingTranslate(text, fromLang, toLang);
    }
    if (translatorSource === 'google') {
        return await googleTranslate(text, fromLang, toLang);
    }
    
    // 自动模式：先尝试 Bing，失败后尝试 Google
    try {
        return await bingTranslate(text, fromLang, toLang);
    } catch (e1) {
        console.error('Bing 翻译失败，尝试 Google:', e1);
        try {
            return await googleTranslate(text, fromLang, toLang);
        } catch (e2) {
            console.error('Google 翻译也失败:', e2);
            throw e2;
        }
    }
}

/**
 * 翻译函数，支持在线和离线模式
 */
async function performTranslationAsync() {
    const text = inputText.value.trim();
    if (!text) {
        resultText.textContent = '翻译结果将显示在这里';
        showToast('请输入要翻译的文字');
        return;
    }
    
    resultText.textContent = '正在翻译...';
    translateBtn.disabled = true;
    
    try {
        let result;
        
        if (translationMode === 'online') {
            result = await autoTranslate(text, srcLang.value, tgtLang.value);
        } else {
            result = translateText(text, srcLang.value, tgtLang.value);
        }
        
        resultText.textContent = result;
    } catch (e) {
        // 如果在线翻译失败，自动降级到离线词典
        if (translationMode === 'online') {
            showToast('在线翻译失败，使用离线词典...');
            try {
                const result = translateText(text, srcLang.value, tgtLang.value);
                resultText.textContent = result + '

⚠️ 在线翻译不可用，以上为词典翻译结果';
            } catch (e2) {
                resultText.textContent = '翻译失败，请检查网络连接';
                showToast('翻译失败');
            }
        } else {
            resultText.textContent = '翻译失败，请重试';
            showToast('翻译失败');
        }
    } finally {
        translateBtn.disabled = false;
    }
}

    // =====================================================
    // 应用状态
    // =====================================================
    let isRecording = false;
    let recognition = null;
    
    // =====================================================
    // 工具函数
    // =====================================================
    function showToast(msg, duration = 2000) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), duration);
    }
    
    function updateCharCount() {
        const len = document.getElementById('inputText').value.length;
        document.getElementById('charCount').textContent = len;
    }
    
    function getSpeechLang(lang) {
        return lang === 'lo' ? 'lo-LA' : 'zh-CN';
    }
    
    // =====================================================
    // 核心翻译函数 - 基于词典的翻译
    // =====================================================
    function translateText(inputText, srcLang, tgtLang) {
        const text = inputText.trim().toLowerCase();
        if (!text) return '';
        
        // 确定翻译方向
        const direction = srcLang === 'lo' ? 'lo_zh' : 'zh_lo';
        const dict = DICTIONARY[direction];
        
        // 1. 精确匹配
        if (dict[text]) {
            return dict[text];
        }
        
        // 2. 尝试逐词匹配
        const words = text.split(/\s+/);
        const results = [];
        let foundCount = 0;
        
        for (const word of words) {
            if (dict[word]) {
                results.push(dict[word]);
                foundCount++;
            } else {
                results.push(word);
            }
        }
        
        // 如果找到的词超过一半，组合结果
        if (foundCount > 0) {
            // 移除重复词，保留原始词顺序
            const finalResult = results.join(' ');
            // 如果完全匹配到，返回那个结果
            if (foundCount === words.length) {
                return finalResult;
            }
            // 否则返回带翻译的混合结果
            return `[翻译] ${finalResult}`;
        }
        
        // 3. 返回带提示的原始文本
        return `【提示】词典中未收录此内容\n原文: ${inputText}\n\n💡 建议：尝试输入更简短的词组或单词`;
    }
    
    // =====================================================
    // 事件处理
    // =====================================================
    const srcLang = document.getElementById('srcLang');
    const tgtLang = document.getElementById('tgtLang');
    const inputText = document.getElementById('inputText');
    const resultText = document.getElementById('resultText');
    const translateBtn = document.getElementById('translateBtn');
    
    // 语言交换
    document.getElementById('swapBtn').addEventListener('click', () => {
        const src = srcLang.value;
        srcLang.value = tgtLang.value;
        tgtLang.value = src;
        showToast('已交换语言方向');
    });
    
    // 语言变化时自动翻译
    srcLang.addEventListener('change', () => {
        if (inputText.value.trim()) {
            performTranslation();
        }
    });
    
    tgtLang.addEventListener('change', () => {
        if (inputText.value.trim()) {
            performTranslation();
        }
    });
    
    // 字符计数
    inputText.addEventListener('input', updateCharCount);
    
    // 翻译
    function performTranslation() {
        performTranslationAsync();
    }
    
    translateBtn.addEventListener('click', performTranslation);
    
    // 回车翻译（Ctrl+Enter）
    inputText.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) {
            e.preventDefault();
            performTranslation();
        }
    });
    
    // =====================================================
    // 语音识别
    // =====================================================
    function initSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            document.getElementById('micBtn').style.display = 'none';
            return;
        }
        
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = getSpeechLang(srcLang.value);
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            inputText.value = transcript;
            updateCharCount();
            performTranslation();
            stopRecording();
        };
        
        recognition.onerror = (event) => {
            console.error('Speech recognition error:', event.error);
            stopRecording();
            if (event.error === 'no-speech') {
                showToast('没有检测到语音，请再说一次');
            } else if (event.error === 'not-allowed') {
                showToast('请允许麦克风权限');
            }
        };
        
        recognition.onend = () => {
            stopRecording();
        };
    }
    
    function startRecording() {
        if (!recognition) {
            initSpeechRecognition();
        }
        if (recognition) {
            recognition.lang = getSpeechLang(srcLang.value);
            recognition.start();
            isRecording = true;
            document.getElementById('micBtn').classList.add('recording');
            showToast('正在聆听...');
        }
    }
    
    function stopRecording() {
        if (recognition) {
            recognition.stop();
        }
        isRecording = false;
        document.getElementById('micBtn').classList.remove('recording');
    }
    
    document.getElementById('micBtn').addEventListener('click', () => {
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    });
    
    srcLang.addEventListener('change', () => {
        if (recognition) {
            recognition.lang = getSpeechLang(srcLang.value);
        }
    });
    
    // =====================================================
    // 语音朗读
    // =====================================================
    function speakText(text, lang) {
        if (!('speechSynthesis' in window)) {
            showToast('浏览器不支持朗读');
            return;
        }
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = getSpeechLang(lang);
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
        showToast('正在朗读...');
    }
    
    document.getElementById('speakInputBtn').addEventListener('click', () => {
        const text = document.getElementById('inputText').value.trim();
        if (text) {
            speakText(text, srcLang.value);
        } else {
            showToast('请先输入文字');
        }
    });
    
    document.getElementById('readBtn').addEventListener('click', () => {
        const text = document.getElementById('resultText').textContent;
        if (text && text !== '翻译结果将显示在这里' && !text.startsWith('翻译')) {
            speakText(text, tgtLang.value);
        } else {
            showToast('没有可朗读的内容');
        }
    });
    
    // =====================================================
    // 清空 & 复制
    // =====================================================
    document.getElementById('clearBtn').addEventListener('click', () => {
        document.getElementById('inputText').value = '';
        updateCharCount();
        document.getElementById('inputText').focus();
        showToast('已清空');
    });
    
    document.getElementById('copyBtn').addEventListener('click', () => {
        const text = document.getElementById('resultText').textContent;
        if (text && text !== '翻译结果将显示在这里') {
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                showToast('复制失败');
            });
        } else {
            showToast('没有可复制的内容');
        }
    });
    
    // =====================================================
    // 初始化
    // =====================================================
    initSpeechRecognition();
    showToast('老挝语翻译器已就绪！🎉  可切换在线/离线模式');
    </script>
</body>
</html>
